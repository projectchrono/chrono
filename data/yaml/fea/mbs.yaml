chrono-version: 10.0
type: MBS

model:  "model_cables.yaml"

solver: "solver_mbs.yaml"

simulation:
  end_time: 100
  enforce_realtime: true
  
output:
  format: HDF5
  mode: SERIES
  fps: 20

visualization:
  type: Model_file
  render_fps: 120
  enable_shadows: true
  camera:
    vertical: Z
    location: [-0.8, -1.8, -0.3]
    target: [0, -0.3, -0.4]
