chrono-version: 10.0
type: FSI

mbs:   "mbs.yaml"
fluid: "sph.yaml"

fsi:
  name: sphere_drop
  angle_degrees: true
  
  data_path:
    type: RELATIVE
    root: "../../.."

  fsi_bodies: 
    - name: object
      shapes:
        - type: SPHERE
          location: [0, 0, 0]
          radius: 0.12

simulation:
  time_step: 1e-3
  end_time: -1
  gravity: [0, 0, -9.8]

visualization:
  render_fps: 120
  enable_shadows: false
  camera:
    vertical: Z
    location: [2, 2, 1.8]
    target: [0, 0, 0.6]
  output:
    save_images: false
    image_type: "bmp"
