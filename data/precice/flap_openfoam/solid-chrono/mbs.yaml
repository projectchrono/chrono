chrono-version: 10.0
type: MBS

model:  "model_mbs.yaml"
solver: "solver_mbs.yaml"

simulation:
  end_time: 100
  enforce_realtime: true
  
output:
  type: NONE
  fps: 20

visualization:
  type: MODEL_FILE

precice_adapter_config:
  participant_name: Solid
      
  data_path:
    type: RELATIVE
    root: "."

  bodies:
  - name: flap
    #point: flap.obj
    #points: flap.stl
    points: flap.txt

  interfaces:
  - mesh_name: SolidMesh
    data_type: RIGID_BODY_MESH_POINTS
    write_data:
    - name: positions
      type: POSITIONS
    - name: velocities
      type: VELOCITIES
    read_data:
    - name: forces
      type: FORCES
    - name: torques
      type: TORQUES
