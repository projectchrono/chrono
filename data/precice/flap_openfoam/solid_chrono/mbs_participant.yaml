chrono-version: 10.0
type: MBS

model:  "mbs_model.yaml"
solver: "mbs_solver.yaml"

simulation:
  end_time: 100
  enforce_realtime: true
  gravity: [0, 0, 0]
  
output:
  type: ASCII
  fps: 20

visualization:
  type: MODEL_FILE
  render_fps: 120
  enable_shadows: false
  camera:
    vertical: Y
    location: [0.1, 0, 1]
    target: [0.1, 0, 0]

precice_adapter_config:
  participant_name: Solid
      
  data_path:
    type: RELATIVE
    root: "."

  bodies:
  - name: flap
    points: flap.txt

  interfaces:
  - mesh_name: SolidMesh
    mesh_type: RIGID_BODY_MESH_POINTS
    write_data:
    - name: Displacement
      type: DISPLACEMENTS
    read_data:
    - name: Force
      type: FORCES
