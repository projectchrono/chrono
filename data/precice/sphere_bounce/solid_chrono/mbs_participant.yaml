chrono-version: 10.0
type: MBS

model:  "mbs_model.yaml"
solver: "mbs_solver.yaml"

simulation:
  end_time: 100
  enforce_realtime: true
  
output:
  format: HDF5
  mode: SERIES
  fps: 20

visualization:
  type: PRIMITIVES

precice_adapter_config:
  participant_name: Solid

  bodies:
  - name: ball
  
  interfaces:
  - mesh_name: SolidMesh
    mesh_type: RIGID_BODY_REFS
    write_data:
    - name: positions
      type: POSITIONS
    - name: velocities
      type: LINEAR_VELOCITIES
    read_data:
    - name: forces
      type: FORCES
    - name: torques
      type: TORQUES
