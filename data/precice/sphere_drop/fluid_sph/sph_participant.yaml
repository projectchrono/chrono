chrono-version: 10.0
type: SPH

model:  "sph_model.yaml"
solver: "sph_solver.yaml"

simulation:  
  end_time: 100
  
output:
  format: NONE
  mode: FRAMES
  fps: 20

visualization:
  render_fps: 120
  enable_shadows: false
  camera:
    vertical: Z
    location: [2, 2, 0.6]
    target: [0, 0, -0.4]
  output:
    save_images: false
    output_directory: "."

  sph_markers: true
  bndry_bce_markers: true
  rigid_bce_markers: true
  flex_bce_markers: true
  active_boxes: false
  color_map:
    type: VELOCITY
    map: FAST
    min: 0.0
    max: 3.5
  visibility:
    SPH: true
    BCE: true
    mode: ALL
    planes:
    - point: [0, 0, 0]
      normal: [1, 0, 0]
    - point: [0, 0, 0]
      normal: [0, 1, 0]
  splashsurf:
    smoothing_length: 2.0
    cube_size: 0.3
    surface_threshold: 0.6

precice_adapter_config:
  participant_name: Fluid
  
  bodies:
  - name: ball
    location: [0, 0, 0.18]
    orientation: [0, 0, 0]
    shapes:
    - type: SPHERE
      location: [0, 0, 0]
      radius: 0.12

  interfaces:
  - mesh_name: FluidMesh
    mesh_type: RIGID_BODY_REFS
    write_data:
    - name: forces
      type: FORCES
    - name: torques
      type: TORQUES
    read_data:
    - name: positions
      type: POSITIONS
    - name: velocities
      type: LINEAR_VELOCITIES
